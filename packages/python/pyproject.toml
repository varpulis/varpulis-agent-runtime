[build-system]
requires = ["maturin>=1.0,<2.0"]
build-backend = "maturin"

[project]
name = "varpulis-agent-runtime"
version = "0.2.0"
description = "Real-time behavioral guardrails for AI agents"
license = { text = "Apache-2.0" }
requires-python = ">=3.9"
classifiers = [
    "Programming Language :: Rust",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Python :: 3",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.optional-dependencies]
langchain = ["langchain-core>=0.2.0"]

[tool.maturin]
manifest-path = "../../crates/varpulis-agent-python/Cargo.toml"
python-source = "src"
module-name = "varpulis_agent_runtime._core"
