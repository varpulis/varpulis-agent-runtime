<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" font-family="system-ui, -apple-system, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="720" height="420" rx="12" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>

  <!-- Title -->
  <text x="360" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#212529">Agent Process</text>

  <!-- Agent Framework Box -->
  <rect x="30" y="55" width="200" height="310" rx="8" fill="#e3f2fd" stroke="#90caf9" stroke-width="1.5"/>
  <text x="130" y="80" text-anchor="middle" font-weight="600" fill="#1565c0">Agent Framework</text>
  <text x="130" y="105" text-anchor="middle" font-size="11" fill="#546e7a">LangChain</text>
  <text x="130" y="122" text-anchor="middle" font-size="11" fill="#546e7a">CrewAI</text>
  <text x="130" y="139" text-anchor="middle" font-size="11" fill="#546e7a">MCP</text>
  <text x="130" y="156" text-anchor="middle" font-size="11" fill="#546e7a">OpenAI SDK</text>
  <text x="130" y="173" text-anchor="middle" font-size="11" fill="#546e7a">Custom</text>

  <!-- Arrow -->
  <path d="M230 200 L280 200" stroke="#78909c" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#78909c"/>
    </marker>
  </defs>

  <!-- Varpulis Runtime Box -->
  <rect x="285" y="55" width="400" height="310" rx="8" fill="#fff" stroke="#5c6bc0" stroke-width="2"/>
  <text x="485" y="80" text-anchor="middle" font-weight="700" font-size="14" fill="#283593">Varpulis Agent Runtime</text>

  <!-- Event Normalizer -->
  <rect x="315" y="100" width="340" height="50" rx="6" fill="#e8eaf6" stroke="#9fa8da" stroke-width="1"/>
  <text x="485" y="130" text-anchor="middle" font-weight="500" fill="#303f9f">Event Normalizer</text>

  <!-- Arrow down -->
  <path d="M485 150 L485 170" stroke="#78909c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Pattern Engine -->
  <rect x="315" y="175" width="340" height="65" rx="6" fill="#fce4ec" stroke="#ef9a9a" stroke-width="1"/>
  <text x="485" y="198" text-anchor="middle" font-weight="600" fill="#c62828">Pattern Engine (Rust/WASM)</text>
  <text x="485" y="218" text-anchor="middle" font-size="10" fill="#78909c">retry storm · stuck agent · error spiral</text>
  <text x="485" y="232" text-anchor="middle" font-size="10" fill="#78909c">budget runaway · token velocity · circular reasoning</text>

  <!-- Arrow down -->
  <path d="M485 240 L485 260" stroke="#78909c" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Action Dispatcher -->
  <rect x="315" y="265" width="340" height="50" rx="6" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="1"/>
  <text x="485" y="295" text-anchor="middle" font-weight="500" fill="#2e7d32">Action Dispatcher (alert · kill)</text>

  <!-- Stats -->
  <text x="360" y="395" text-anchor="middle" font-size="11" fill="#78909c">In-process · &lt;1ms per event · 220KB WASM bundle</text>
</svg>
